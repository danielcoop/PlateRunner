name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PlateRunner.slnx --ignore-failed-sources

      - name: Build
        run: dotnet build PlateRunner.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test tests/PlateRunner.Package.Tests/PlateRunner.Package.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
